name: Discord PR Notification

on:
  pull_request:
    types: [opened, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🔀 New Pull Request: ${{ github.event.pull_request.title }}",
                "url": "${{ github.event.pull_request.html_url }}",
                "color": 5814783,
                "fields": [
                  { "name": "Author", "value": "${{ github.event.pull_request.user.login }}", "inline": true },
                  { "name": "Branch", "value": "`${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`", "inline": true },
                  { "name": "Repo", "value": "${{ github.repository }}", "inline": false }
                ],
                "footer": { "text": "GitHub Actions" },
                "timestamp": "${{ github.event.pull_request.created_at }}"
              }]
            }' \
            $DISCORD_WEBHOOK_URL
